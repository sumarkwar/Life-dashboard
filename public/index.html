<!DOCTYPE html>
<html>
<head>
<title>Login</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">

<style>
body {
    font-family: 'Poppins', sans-serif;
    margin: 0;
    height: 100vh;
    overflow: hidden;
    background: linear-gradient(135deg,#020617,#1e3a8a,#7c3aed);
    background-size: 300% 300%;
    animation: gradientMove 10s ease infinite;
    display: flex;
    justify-content: center;
    align-items: center;
}

/* Animated gradient */
@keyframes gradientMove {
    0% {background-position:0%}
    50% {background-position:100%}
    100% {background-position:0%}
}

/* Floating bubbles */
.bubble {
    position: absolute;
    border-radius: 50%;
    background: radial-gradient(circle,#9333ea,transparent);
    opacity: 0.5;
    animation: float 12s infinite ease-in-out;
    z-index: 0;
}

@keyframes float {
    0% {transform: translateY(0);}
    50% {transform: translateY(-120px);}
    100% {transform: translateY(0);}
}

/* Card */
.card {
    position: relative;
    z-index: 1;
    background: rgba(255,255,255,0.08);
    backdrop-filter: blur(20px);
    padding: 35px;
    border-radius: 15px;
    width: 340px;
    box-shadow: 0 0 40px rgba(0,0,0,0.5);
    text-align: center;
    color: white;
}

h2 {
    font-weight: 600;
}

input {
    width: 100%;
    padding: 12px;
    margin: 10px 0;
    border-radius: 8px;
    border: none;
    background: rgba(255,255,255,0.15);
    color: white;
    font-weight: 500;
}

input::placeholder {
    color: #cbd5f5;
}

button {
    width: 100%;
    padding: 12px;
    background: linear-gradient(45deg,#3b82f6,#9333ea);
    border: none;
    border-radius: 8px;
    color: white;
    font-weight: 600;
    cursor: pointer;
}

a {
    color: #60a5fa;
}
</style>
</head>

<body>

<!-- Floating bubbles -->
<div class="bubble" style="width:80px;height:80px;top:10%;left:15%"></div>
<div class="bubble" style="width:120px;height:120px;top:60%;left:70%"></div>
<div class="bubble" style="width:60px;height:60px;top:30%;left:80%"></div>

<div class="card">
    <h2>Login</h2>

    <input id="identifier" placeholder="Email or Phone">
    <input id="password" type="password" placeholder="Password">

    <button onclick="login()">Login</button>

    <p><a href="register.html">Create Account</a></p>
</div>

<script src="script.js"></script>
</body>
</html>
